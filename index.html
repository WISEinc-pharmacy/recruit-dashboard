<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>候補者ダッシュボード</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif; background: #f5f7fa; color: #333; font-size: 13px; }

/* ===== Header ===== */
.header { background: #1a5276; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 16px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 8px; }
.header .user-info { font-size: 11px; opacity: 0.8; }
.btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-logout { background: rgba(255,255,255,0.2); color: #fff; }
.btn-primary { background: #2ecc71; color: #fff; }
.btn-secondary { background: #ecf0f1; color: #333; }
.btn-warn { background: #e74c3c; color: #fff; }
.btn-small { padding: 3px 8px; font-size: 11px; }

/* ===== Login Screen ===== */
#loginScreen { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #1a5276 0%, #2c3e50 100%); }
.login-card { background: #fff; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.15); max-width: 360px; width: 90%; }
.login-card h2 { margin-bottom: 8px; color: #1a5276; }
.login-card p { color: #666; margin-bottom: 24px; font-size: 13px; }
.btn-google { background: #4285f4; color: #fff; padding: 10px 24px; font-size: 14px; border-radius: 6px; display: inline-flex; align-items: center; gap: 8px; }

/* ===== Summary Cards ===== */
.summary-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; background: #fff; border-bottom: 1px solid #e0e0e0; }
.summary-card { padding: 8px 14px; border-radius: 8px; text-align: center; cursor: pointer; min-width: 80px; border: 2px solid transparent; transition: all 0.2s; flex-shrink: 0; }
.summary-card:hover { opacity: 0.85; }
.summary-card.active { border-color: #1a5276; }
.summary-card .count { font-size: 22px; font-weight: 700; }
.summary-card .label { font-size: 10px; margin-top: 2px; }
.sc-all { background: #ecf0f1; color: #333; }
.sc-confirmed { background: #d5f5e3; color: #1e8449; }
.sc-adjusting { background: #fdebd0; color: #ca6f1e; }
.sc-screening { background: #d6eaf8; color: #2471a3; }
.sc-closed { background: #f2f3f4; color: #909497; }
.sc-reply { background: #fadbd8; color: #c0392b; }

/* ===== Filter Bar ===== */
.filter-bar { padding: 8px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filter-bar input, .filter-bar select { padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
.filter-bar input[type="text"] { width: 180px; }
@media (max-width: 600px) { .filter-bar input[type="text"] { width: 100%; } }

/* ===== Table ===== */
.table-wrap { overflow-x: auto; padding: 0 8px 80px; }
table { width: 100%; border-collapse: collapse; margin-top: 4px; font-size: 12px; }
thead th { background: #f8f9fa; padding: 8px 6px; text-align: left; border-bottom: 2px solid #dee2e6; position: sticky; top: 0; z-index: 2; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:hover { background: #e9ecef; }
tbody tr { border-bottom: 1px solid #eee; transition: background 0.15s; }
tbody tr:hover { background: #f0f7ff; }
tbody td { padding: 7px 6px; vertical-align: top; }
.col-id { min-width: 80px; font-family: monospace; font-size: 11px; color: #666; }
.col-name { min-width: 80px; font-weight: 600; }
.col-age { min-width: 40px; text-align: center; }
.col-location { min-width: 90px; }
.col-agent { min-width: 100px; }
.col-status { min-width: 90px; }
.col-area { min-width: 70px; }
.col-handler { min-width: 70px; }
.col-date { min-width: 75px; font-size: 11px; color: #888; }
.col-actions { min-width: 40px; text-align: center; }

/* ===== Status Badges ===== */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-received { background: #d6eaf8; color: #2471a3; }
.badge-adjusting { background: #fdebd0; color: #ca6f1e; }
.badge-confirmed { background: #d5f5e3; color: #1e8449; }
.badge-rejected { background: #f2f3f4; color: #909497; }
.badge-declined { background: #f2f3f4; color: #909497; }
.badge-passed { background: #f2f3f4; color: #909497; }
.badge-hired { background: #abebc6; color: #196f3d; }
.badge-reply { background: #fadbd8; color: #c0392b; }
.area-tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; background: #eee; margin: 1px; }

/* ===== Detail Panel (モバイル対応) ===== */
.detail-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; }
.detail-overlay.open { display: block; }
.detail-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 400px; max-width: 100vw; background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,0.15); z-index: 101; overflow-y: auto; padding: 20px; transform: translateX(100%); transition: transform 0.25s ease; }
.detail-panel.open { transform: translateX(0); }
.detail-panel h3 { margin-bottom: 16px; font-size: 16px; color: #1a5276; display: flex; justify-content: space-between; align-items: center; }
.detail-panel .close-btn { cursor: pointer; font-size: 20px; color: #999; background: none; border: none; }
.detail-field { margin-bottom: 12px; }
.detail-field label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; font-weight: 600; }
.detail-field .value { font-size: 13px; }
.detail-field select, .detail-field input, .detail-field textarea { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: inherit; }
.detail-field textarea { height: 100px; resize: vertical; }
.detail-actions { margin-top: 16px; display: flex; gap: 8px; }

/* ===== Toast ===== */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 13px; z-index: 200; display: none; }
.toast.show { display: block; animation: fadeInOut 2.5s; }
@keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

/* ===== Loading ===== */
.loading { text-align: center; padding: 40px; color: #999; }

/* ===== レスポンシブ ===== */
@media (max-width: 768px) {
  .header h1 { font-size: 14px; }
  .summary-bar { padding: 8px; gap: 6px; }
  .summary-card { padding: 6px 10px; min-width: 65px; }
  .summary-card .count { font-size: 18px; }
  table { font-size: 11px; }
  thead th, tbody td { padding: 5px 4px; }
  .detail-panel { width: 100vw; }
  /* モバイルではエージェントメール列を隠す */
  .col-agent-email { display: none; }
}
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div id="loginScreen">
  <div class="login-card">
    <h2>候補者ダッシュボード</h2>
    <p>外来プロジェクト 採用管理</p>
    <button class="btn btn-google" onclick="doLogin()">Googleアカウントでログイン</button>
  </div>
</div>

<!-- ===== Main App ===== -->
<div id="mainApp" style="display:none;">

  <!-- Header -->
  <div class="header">
    <h1>候補者ダッシュボード</h1>
    <div class="header-right">
      <span class="user-info" id="userInfo"></span>
      <button class="btn btn-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-bar" id="summaryBar">
    <div class="summary-card sc-all active" data-filter="all" onclick="filterByStatus('all', this)">
      <div class="count" id="countAll">0</div>
      <div class="label">全件</div>
    </div>
    <div class="summary-card sc-confirmed" data-filter="confirmed" onclick="filterByStatus('confirmed', this)">
      <div class="count" id="countConfirmed">0</div>
      <div class="label">面接確定</div>
    </div>
    <div class="summary-card sc-adjusting" data-filter="adjusting" onclick="filterByStatus('adjusting', this)">
      <div class="count" id="countAdjusting">0</div>
      <div class="label">調整中</div>
    </div>
    <div class="summary-card sc-screening" data-filter="screening" onclick="filterByStatus('screening', this)">
      <div class="count" id="countScreening">0</div>
      <div class="label">選考中</div>
    </div>
    <div class="summary-card sc-closed" data-filter="closed" onclick="filterByStatus('closed', this)">
      <div class="count" id="countClosed">0</div>
      <div class="label">終了</div>
    </div>
    <div class="summary-card sc-reply" data-filter="reply" onclick="filterByStatus('reply', this)">
      <div class="count" id="countReply">0</div>
      <div class="label">返信要</div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="名前・ID・エリアで検索..." oninput="applyFilters()">
    <select id="areaFilter" onchange="applyFilters()">
      <option value="">全エリア</option>
      <option value="城北">城北</option>
      <option value="東葛">東葛</option>
      <option value="越谷">越谷</option>
      <option value="清瀬">清瀬</option>
      <option value="足立">足立</option>
    </select>
    <select id="sortSelect" onchange="applyFilters()">
      <option value="updatedAt-desc">更新日 新しい順</option>
      <option value="updatedAt-asc">更新日 古い順</option>
      <option value="age-asc">年齢 若い順</option>
      <option value="age-desc">年齢 高い順</option>
      <option value="status">ステータス順</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-id">JS ID</th>
          <th class="col-name">名前</th>
          <th class="col-age">年齢</th>
          <th>性別</th>
          <th class="col-location">居住地</th>
          <th class="col-agent">担当者</th>
          <th class="col-agent-email">メール</th>
          <th class="col-status">ステータス</th>
          <th class="col-area">エリア</th>
          <th class="col-handler">対応者</th>
          <th class="col-date">更新日</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="candidateBody"></tbody>
    </table>
    <div class="loading" id="loadingMsg">読み込み中...</div>
  </div>
</div>

<!-- ===== Detail Panel ===== -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <h3>
    <span id="detailTitle">候補者詳細</span>
    <button class="close-btn" onclick="closeDetail()">&times;</button>
  </h3>
  <div class="detail-field"><label>JS ID</label><div class="value" id="dJsId"></div></div>
  <div class="detail-field"><label>名前</label><div class="value" id="dName"></div></div>
  <div class="detail-field"><label>年齢 / 性別</label><div class="value" id="dAgeSex"></div></div>
  <div class="detail-field"><label>居住地</label><div class="value" id="dLocation"></div></div>
  <div class="detail-field"><label>担当者</label><div class="value" id="dAgent"></div></div>
  <div class="detail-field"><label>担当者メール</label><div class="value" id="dAgentEmail"></div></div>
  <div class="detail-field"><label>経験</label><div class="value" id="dExperience"></div></div>
  <div class="detail-field"><label>希望年収</label><div class="value" id="dSalary"></div></div>
  <div class="detail-field"><label>入職時期</label><div class="value" id="dStartDate"></div></div>
  <hr style="margin: 16px 0; border: none; border-top: 1px solid #eee;">
  <div class="detail-field">
    <label>ステータス</label>
    <select id="dStatus" onchange="markDetailDirty()">
      <option value="紹介受領">紹介受領</option>
      <option value="書類選考中">書類選考中</option>
      <option value="面接調整中">面接調整中</option>
      <option value="面接確定">面接確定</option>
      <option value="面接済み">面接済み</option>
      <option value="入社確定">入社確定</option>
      <option value="不採用">不採用</option>
      <option value="辞退">辞退</option>
      <option value="見送り">見送り</option>
      <option value="保留">保留</option>
    </select>
  </div>
  <div class="detail-field">
    <label>エリア</label>
    <select id="dArea" onchange="markDetailDirty()">
      <option value="">未振分</option>
      <option value="城北">城北</option>
      <option value="東葛">東葛</option>
      <option value="越谷">越谷</option>
      <option value="清瀬">清瀬</option>
      <option value="足立">足立</option>
      <option value="全エリア">全エリア</option>
    </select>
  </div>
  <div class="detail-field">
    <label>対応者</label>
    <input type="text" id="dHandler" placeholder="例: 高畑" oninput="markDetailDirty()">
  </div>
  <div class="detail-field">
    <label>返信要</label>
    <select id="dNeedsReply" onchange="markDetailDirty()">
      <option value="false">不要</option>
      <option value="true">要</option>
      <option value="waiting">待ち</option>
    </select>
  </div>
  <div class="detail-field">
    <label>備考メモ</label>
    <textarea id="dNotes" placeholder="メモを入力..." oninput="markDetailDirty()"></textarea>
  </div>
  <div class="detail-actions">
    <button class="btn btn-primary" id="btnSaveDetail" onclick="saveDetail()" disabled>保存</button>
    <button class="btn btn-secondary" onclick="closeDetail()">閉じる</button>
  </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<!-- ===== Firebase SDK ===== -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
// ===== Firebase Config =====
firebase.initializeApp({
  apiKey: "AIzaSyBJ54_fRiCIoxkLrPh_i5L23XBzXxcshgA",
  authDomain: "wise-recruit-db5f3.firebaseapp.com",
  projectId: "wise-recruit-db5f3",
  storageBucket: "wise-recruit-db5f3.firebasestorage.app",
  messagingSenderId: "209708717461",
  appId: "1:209708717461:web:ffa3f7354873ed1b54d29c"
});
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;
let userRole = 'viewer';

// ===== State =====
let allCandidates = [];
let currentFilter = 'all';
let currentDetailId = null;
let detailDirty = false;

// ===== Auth =====
function doLogin() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(e => alert('ログインに失敗しました: ' + e.message));
}
function doLogout() { auth.signOut(); }

auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('userInfo').textContent = user.displayName || user.email;
    await checkUserRole(user);
    loadCandidates();
  } else {
    currentUser = null;
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }
});

async function checkUserRole(user) {
  const doc = await db.collection('users').doc(user.email).get();
  if (doc.exists) {
    userRole = doc.data().role || 'viewer';
  } else {
    const snap = await db.collection('users').get();
    if (snap.empty) {
      userRole = 'admin';
      await db.collection('users').doc(user.email).set({
        email: user.email,
        name: user.displayName || '',
        role: 'admin',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await auth.signOut();
      alert('アクセス権がありません。\n管理者にご連絡ください。');
      return;
    }
  }
}

// ===== Load Candidates (リアルタイム) =====
function loadCandidates() {
  document.getElementById('loadingMsg').style.display = 'block';
  db.collection('candidates').orderBy('updatedAt', 'desc').onSnapshot(snap => {
    allCandidates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateSummary();
    applyFilters();
    document.getElementById('loadingMsg').style.display = 'none';
  }, err => {
    console.error('Firestore error:', err);
    document.getElementById('loadingMsg').textContent = 'データ取得エラー';
  });
}

// ===== Summary =====
const STATUS_GROUPS = {
  confirmed: ['面接確定', '面接済み'],
  adjusting: ['面接調整中'],
  screening: ['紹介受領', '書類選考中', '保留'],
  closed: ['不採用', '辞退', '見送り', '入社確定']
};

function getStatusGroup(s) {
  for (const [g, list] of Object.entries(STATUS_GROUPS)) {
    if (list.includes(s)) return g;
  }
  return 'screening';
}

function updateSummary() {
  let counts = { all: allCandidates.length, confirmed: 0, adjusting: 0, screening: 0, closed: 0, reply: 0 };
  allCandidates.forEach(c => {
    const g = getStatusGroup(c.status);
    counts[g]++;
    if (c.needsReply === true || c.needsReply === 'true' || c.needsReply === 'waiting') counts.reply++;
  });
  document.getElementById('countAll').textContent = counts.all;
  document.getElementById('countConfirmed').textContent = counts.confirmed;
  document.getElementById('countAdjusting').textContent = counts.adjusting;
  document.getElementById('countScreening').textContent = counts.screening;
  document.getElementById('countClosed').textContent = counts.closed;
  document.getElementById('countReply').textContent = counts.reply;
}

// ===== Filter & Render =====
function filterByStatus(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const areaF = document.getElementById('areaFilter').value;
  const sort = document.getElementById('sortSelect').value;

  let filtered = allCandidates.filter(c => {
    // Status group filter
    if (currentFilter === 'reply') {
      if (c.needsReply !== true && c.needsReply !== 'true' && c.needsReply !== 'waiting') return false;
    } else if (currentFilter !== 'all') {
      if (getStatusGroup(c.status) !== currentFilter) return false;
    }
    // Area filter
    if (areaF && !(c.area || '').includes(areaF)) return false;
    // Text search
    if (search) {
      const hay = [c.jsId, c.name, c.location, c.agent, c.agentEmail, c.area, c.handler, c.notes].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Sort
  const [key, dir] = sort.split('-');
  filtered.sort((a, b) => {
    let va, vb;
    if (key === 'updatedAt') {
      va = a.updatedAt ? (a.updatedAt.toDate ? a.updatedAt.toDate().getTime() : new Date(a.updatedAt).getTime()) : 0;
      vb = b.updatedAt ? (b.updatedAt.toDate ? b.updatedAt.toDate().getTime() : new Date(b.updatedAt).getTime()) : 0;
    } else if (key === 'age') {
      va = parseInt(a.age) || 999;
      vb = parseInt(b.age) || 999;
    } else if (key === 'status') {
      const order = ['面接確定', '面接済み', '面接調整中', '紹介受領', '書類選考中', '保留', '入社確定', '不採用', '辞退', '見送り'];
      va = order.indexOf(a.status); if (va < 0) va = 99;
      vb = order.indexOf(b.status); if (vb < 0) vb = 99;
    }
    return dir === 'asc' ? va - vb : vb - va;
  });

  renderTable(filtered);
}

function renderTable(list) {
  const tbody = document.getElementById('candidateBody');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:24px;color:#999;">該当する候補者はいません</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(c => {
    const statusBadge = getStatusBadge(c.status);
    const areaTags = (c.area || '').split(',').filter(Boolean).map(a => `<span class="area-tag">${esc(a.trim())}</span>`).join('');
    const replyMark = (c.needsReply === true || c.needsReply === 'true') ? '<span class="badge badge-reply">要返信</span>' : (c.needsReply === 'waiting' ? '<span class="badge" style="background:#fff3cd;color:#856404;">待ち</span>' : '');
    const dateStr = c.updatedAt ? formatDate(c.updatedAt) : '-';
    return `<tr onclick="openDetail('${c.id}')" style="cursor:pointer;">
      <td class="col-id">${esc(c.jsId || '-')}</td>
      <td class="col-name">${esc(c.name || '-')}</td>
      <td class="col-age">${esc(c.age || '-')}</td>
      <td>${esc(c.gender || '-')}</td>
      <td class="col-location">${esc(c.location || '-')}</td>
      <td class="col-agent">${esc(c.agent || '-')}</td>
      <td class="col-agent-email" style="font-size:10px;">${esc(c.agentEmail || '-')}</td>
      <td class="col-status">${statusBadge} ${replyMark}</td>
      <td class="col-area">${areaTags || '-'}</td>
      <td class="col-handler">${esc(c.handler || '-')}</td>
      <td class="col-date">${dateStr}</td>
      <td class="col-actions"><span style="font-size:16px;">›</span></td>
    </tr>`;
  }).join('');
}

function getStatusBadge(status) {
  const map = {
    '紹介受領': 'badge-received', '書類選考中': 'badge-received',
    '面接調整中': 'badge-adjusting',
    '面接確定': 'badge-confirmed', '面接済み': 'badge-confirmed',
    '入社確定': 'badge-hired',
    '不採用': 'badge-rejected', '辞退': 'badge-declined', '見送り': 'badge-passed',
    '保留': 'badge-received'
  };
  return `<span class="badge ${map[status] || 'badge-received'}">${esc(status || '不明')}</span>`;
}

// ===== Detail Panel =====
function openDetail(id) {
  const c = allCandidates.find(x => x.id === id);
  if (!c) return;
  currentDetailId = id;
  detailDirty = false;
  document.getElementById('btnSaveDetail').disabled = true;

  document.getElementById('detailTitle').textContent = c.name || c.jsId || '候補者詳細';
  document.getElementById('dJsId').textContent = c.jsId || '-';
  document.getElementById('dName').textContent = c.name || '-';
  document.getElementById('dAgeSex').textContent = `${c.age || '-'} / ${c.gender || '-'}`;
  document.getElementById('dLocation').textContent = c.location || '-';
  document.getElementById('dAgent').textContent = c.agent || '-';
  document.getElementById('dAgentEmail').textContent = c.agentEmail || '-';
  document.getElementById('dExperience').textContent = c.experience || '-';
  document.getElementById('dSalary').textContent = c.desiredSalary || '-';
  document.getElementById('dStartDate').textContent = c.startDate || '-';

  document.getElementById('dStatus').value = c.status || '紹介受領';
  document.getElementById('dArea').value = c.area || '';
  document.getElementById('dHandler').value = c.handler || '';
  document.getElementById('dNeedsReply').value = String(c.needsReply || 'false');
  document.getElementById('dNotes').value = c.notes || '';

  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  if (detailDirty && !confirm('保存されていない変更があります。閉じますか？')) return;
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  currentDetailId = null;
  detailDirty = false;
}

function markDetailDirty() {
  detailDirty = true;
  document.getElementById('btnSaveDetail').disabled = false;
}

async function saveDetail() {
  if (!currentDetailId) return;
  const updates = {
    status: document.getElementById('dStatus').value,
    area: document.getElementById('dArea').value,
    handler: document.getElementById('dHandler').value,
    needsReply: document.getElementById('dNeedsReply').value === 'true' ? true : (document.getElementById('dNeedsReply').value === 'waiting' ? 'waiting' : false),
    notes: document.getElementById('dNotes').value,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  try {
    await db.collection('candidates').doc(currentDetailId).update(updates);
    detailDirty = false;
    document.getElementById('btnSaveDetail').disabled = true;
    showToast('保存しました');
  } catch (e) {
    alert('保存に失敗しました: ' + e.message);
  }
}

// ===== Helpers =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatDate(ts) {
  let d;
  if (ts && ts.toDate) d = ts.toDate();
  else if (ts) d = new Date(ts);
  else return '-';
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
